<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#030712">
    <title>Administration — Green Express</title>
    <link rel="stylesheet" href="/styles.css">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
</head>
<body class="gx-page min-h-screen admin-body">
    <div class="gx-blob-layer" aria-hidden="true">
        <div class="gx-blob gx-blob--cyan"></div>
        <div class="gx-blob gx-blob--magenta"></div>
        <div class="gx-blob gx-blob--violet"></div>
    </div>

    <div class="admin-root gx-main-shell">
        <!-- Écran connexion -->
        <div id="adminLoginScreen" class="admin-login-stack">
            <header class="glass-nav text-white py-5">
                <div class="gx-container gx-container--narrow admin-login-header-inner">
                    <div class="admin-brand-lockup">
                        <img src="/logo.png" alt="" class="admin-logo-sm" width="48" height="48">
                        <div class="admin-minw-0">
                            <p class="font-bold text-lg gx-nav-title font-heading">Green Express</p>
                            <p class="text-xs gx-text-muted">Espace réservé</p>
                        </div>
                    </div>
                    <a href="/" class="gx-btn-ghost admin-link-form">← Formulaire</a>
                </div>
            </header>
            <main class="gx-main-safe admin-login-main">
                <div class="admin-login-card-wrap gx-login-card admin-login-card-pad">
                    <h1 class="admin-h1-login font-heading gradient-text">Connexion administrateur</h1>
                    <p class="gx-text-muted admin-intro-login">Accédez à la liste des candidatures.</p>
                    <form id="adminLoginForm" class="admin-form-stack">
                        <div>
                            <label for="adminEmail" class="admin-form-label">Email</label>
                            <input id="adminEmail" type="email" required autocomplete="username" class="admin-form-input" placeholder="votre@email.com">
                        </div>
                        <div>
                            <label for="adminPassword" class="admin-form-label">Mot de passe</label>
                            <input id="adminPassword" type="password" required autocomplete="current-password" class="admin-form-input" placeholder="••••••••">
                        </div>
                        <p id="adminLoginError" class="admin-login-error hidden" role="alert"></p>
                        <button type="submit" class="admin-btn-block">Se connecter</button>
                    </form>
                </div>
            </main>
        </div>

        <!-- Tableau de bord -->
        <div id="adminDashboard" class="admin-dashboard hidden">
            <header class="glass-nav text-white py-5">
                <div class="gx-container admin-dash-header">
                    <div class="admin-dash-brand">
                        <img src="/logo.png" alt="" class="admin-logo-md" width="56" height="56">
                        <div class="admin-dash-titles admin-minw-0">
                            <h1 class="admin-dash-title font-heading gx-nav-title">Espace administrateur</h1>
                            <p class="admin-subtitle-dash gx-text-muted">Candidatures reçues</p>
                        </div>
                    </div>
                    <div class="admin-dash-actions">
                        <a href="/" class="gx-btn-ghost admin-btn-text">← Retour au formulaire</a>
                        <button type="button" onclick="logoutAdmin()" class="gx-btn-gold admin-btn-text">Se déconnecter</button>
                    </div>
                </div>
            </header>

            <div class="gx-container admin-dash-body">
                <div class="bg-white/10 backdrop-blur-md rounded-2xl admin-card-pad border border-white/20 shadow-2xl admin-card-surface">
                    <div class="gx-table-wrap">
                        <table class="gx-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Nom</th>
                                    <th>Postes</th>
                                    <th>Disponibilités</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="adminTableBody"></tbody>
                        </table>
                    </div>

                    <div id="adminDetail" class="gx-detail-panel hidden">
                        <div class="admin-detail-toolbar">
                            <h2 class="admin-detail-heading font-heading gradient-text">Détails du candidat</h2>
                            <div class="admin-detail-buttons">
                                <button type="button" onclick="exportAdminPdf()" class="gx-btn-gold admin-detail-pdf-btn">Télécharger PDF</button>
                                <button type="button" onclick="hideAdminDetail()" class="gx-btn-table">Fermer</button>
                            </div>
                        </div>
                        <div id="adminDetailContent" class="admin-detail-content gx-text-muted"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/admin.js"></script>
</body>
</html>
