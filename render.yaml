# Blueprint Render — https://render.com/docs/blueprint-spec
# Déploiement : Dashboard Render → New → Blueprint → connecter ce dépôt Git.
# La base PostgreSQL est créée avec le Web Service ; DATABASE_URL est injectée automatiquement.

databases:
  - name: greenexpress-postgres
    databaseName: cv_greenexpress
    user: greenexpress
    plan: free
    region: frankfurt

services:
  - type: web
    name: green-express-recrutement
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: greenexpress-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
