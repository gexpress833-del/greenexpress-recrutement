# Blueprint Render — https://render.com/docs/blueprint-spec
# Déploiement : Dashboard Render → New → Blueprint → connecter ce dépôt Git.
#
# DATABASE_URL : avec ce blueprint, elle est injectée depuis la base « greenexpress-postgres » ci-dessous.
# Si vous utilisez une base Postgres créée à part (hors blueprint), ouvrez le Web Service sur le dashboard
# → Environment → ajoutez DATABASE_URL = Internal Database URL de cette base, ou liez la base au service.
# Sans DATABASE_URL sur le service web, les candidatures ne s’enregistrent pas.

databases:
  - name: greenexpress-postgres
    databaseName: cv_greenexpress
    user: greenexpress
    plan: free
    region: frankfurt

services:
  - type: web
    name: green-express-recrutement
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: greenexpress-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
